<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>НЕДЕЛЯ — планировщик питания</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Bonche';
  src: url('https://raw.githubusercontent.com/vernongodlittle/foodplan/main/Bonche-Light.otf') format('opentype');
  font-weight: 300;
  font-display: swap;
}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F2EDE3;--ink:#1A1A18;--border:#1A1A18;--border-light:#D8D4CA;--surface:#F2EDE3;--muted:#888;--hint:#bbb}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
button,input,textarea,select{font-family:'DM Sans',sans-serif;cursor:pointer}
input,textarea{cursor:text}

/* TOPBAR */
.topbar{background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;position:sticky;top:0;z-index:100;border-bottom:1.5px solid #2a2a28}
.logo{font-family:'Bonche',Georgia,serif;font-size:18px;color:var(--bg);letter-spacing:4px;text-transform:uppercase}
.nav{display:flex}
.nav-btn{padding:5px 18px;font-size:11px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;background:transparent;color:#666;border:none;transition:all .15s}
.nav-btn.active{background:var(--bg);color:var(--ink)}
.topbar-right{display:flex;align-items:center;gap:12px}
.sync-txt{font-size:10px;letter-spacing:.5px}
.sync-ok{color:#8aaa52}.sync-syncing{color:#888}.sync-err{color:#c03030}
.gen-btn{background:var(--bg);color:var(--ink);border:none;padding:7px 16px;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase}
.gen-btn:hover{background:#E0D9CE}

/* PAGES */
.page{display:none;padding:24px;max-width:1280px;margin:0 auto}
.page.active{display:block}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{border:1.5px solid var(--border);padding:14px 16px;background:var(--surface)}
.stat-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.stat-val{font-family:'Bonche',Georgia,serif;font-size:32px;font-weight:300;letter-spacing:-1px;color:var(--ink)}
.stat-unit{font-size:12px;color:var(--muted);margin-left:4px}
.stat-bar{height:2px;background:var(--border-light);margin-top:8px}
.stat-fill{height:100%;background:var(--ink);transition:width .3s}

/* WEEK */
.week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.week-title{font-family:'Bonche',Georgia,serif;font-size:20px;letter-spacing:-.5px}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{padding:4px 12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px}
.week-nav button:hover{background:var(--ink);color:var(--bg)}
.week-nav span{font-size:11px;color:var(--muted);min-width:110px;text-align:center;letter-spacing:.5px}
.week-layout{display:grid;grid-template-columns:1fr 230px;gap:20px}

.col-headers{display:grid;grid-template-columns:52px repeat(4,1fr);gap:8px;margin-bottom:6px}
.col-hdr{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint);text-align:center;padding-bottom:4px;border-bottom:1px solid var(--border)}
.day-row{display:grid;grid-template-columns:52px repeat(4,1fr);gap:8px;margin-bottom:8px}

.day-lbl{display:flex;flex-direction:column;align-items:center;justify-content:center}
.day-name{font-size:9px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.day-num{font-family:'Bonche',Georgia,serif;font-size:24px;font-weight:300;color:var(--ink);line-height:1.1}
.day-lbl.cook .day-num{font-weight:400}
.day-row.cook-row .day-lbl .day-num{color:#4A6030;font-weight:500}
.day-row.cook-row .day-lbl .day-name{color:#4A6030}
.day-row.cook-row .day-lbl .cook-dot{background:#4A6030;width:6px;height:6px}
.cook-day-bg{background:#EAE9DC!important;border-color:#A8B090!important}
.day-row.cook-row .empty-cell{background:#EAE9DC;border-color:#C0C8A8}
.cook-dot{width:5px;height:5px;border-radius:50%;background:var(--ink);margin-top:3px}

.meal-cell{border:1.5px solid var(--border);padding:10px 12px;min-height:95px;display:flex;flex-direction:column;position:relative;background:var(--surface);transition:background .12s}
.meal-cell:hover{background:var(--ink)}
.meal-cell:hover .mc-type,.meal-cell:hover .mc-name,.meal-cell:hover .mc-prot,.meal-cell:hover .mc-tag{color:var(--bg);border-color:var(--bg)}
.meal-cell:hover .mc-swap{opacity:1;color:var(--bg);border-color:var(--bg)}
.meal-cell.leftover{border-top:3px solid var(--muted)}
.mc-leftover{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--hint);margin-bottom:4px}
.mc-type{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mc-name{font-size:12px;font-weight:500;color:var(--ink);line-height:1.3;flex:1;margin-bottom:5px}
.mc-prot{font-size:10px;color:var(--muted);margin-bottom:5px}
.mc-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.mc-tag{font-size:8px;letter-spacing:.8px;text-transform:uppercase;padding:1px 6px;border:1px solid var(--ink);color:var(--ink)}
.mc-swap{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink);border:1px solid var(--ink);padding:3px 0;text-align:center;background:transparent;width:100%;opacity:0;transition:opacity .15s;margin-top:auto}
.empty-cell{border:1.5px dashed var(--border-light);min-height:95px;display:flex;align-items:center;justify-content:center;color:var(--hint);font-size:20px;transition:all .15s}
.empty-cell:hover{border-color:var(--ink);color:var(--ink);cursor:pointer}

/* COOK DAY BADGE */
.cook-badge{display:inline-flex;align-items:center;gap:4px;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* SHOPPING */
.shop-panel{border:1.5px solid var(--border);padding:16px;height:fit-content;position:sticky;top:78px;background:var(--surface)}
.shop-title{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1.5px solid var(--border)}
.shop-cat{margin-bottom:14px}
.shop-cat-title{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--hint);margin-bottom:6px;padding-bottom:3px;border-bottom:.5px solid var(--border-light)}
.shop-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;cursor:pointer;user-select:none}
.shop-item.checked span{text-decoration:line-through;color:var(--hint)}
.shop-dot{width:4px;height:4px;border-radius:50%;background:var(--ink);flex-shrink:0}
.shop-item.checked .shop-dot{background:var(--hint)}

/* RECIPES */
.recipes-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.recipes-head h2{font-family:'Bonche',Georgia,serif;font-size:22px;letter-spacing:-.5px;flex:1}
.search-box{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);padding:6px 12px;background:var(--surface)}
.search-box input{border:none;outline:none;font-size:13px;color:var(--ink);width:180px;background:transparent}
.add-btn{background:var(--ink);color:var(--bg);border:none;padding:8px 16px;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap}
.add-btn:hover{background:#333}
.outline-btn{background:transparent;color:var(--ink);border:1.5px solid var(--ink);padding:7px 14px;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.outline-btn:hover{background:var(--ink);color:var(--bg)}
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-pill{padding:4px 12px;font-size:11px;letter-spacing:.5px;border:1.5px solid var(--border-light);color:var(--muted);background:transparent;transition:all .12s}
.filter-pill.active{border-color:var(--ink);color:var(--ink);font-weight:500}
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.recipe-card{border:1.5px solid var(--border);padding:14px;background:var(--surface);transition:background .12s;position:relative}
.recipe-card:hover{background:var(--ink)}
.recipe-card:hover .rc-type,.recipe-card:hover .rc-name,.recipe-card:hover .rc-meta,.recipe-card:hover .rc-tag{color:var(--bg);border-color:var(--bg)}
.recipe-card.banned{opacity:.5}
.rc-type{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.rc-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:8px}
.rc-meta{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:8px}
.rc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.rc-tag{font-size:8px;letter-spacing:.8px;text-transform:uppercase;padding:1px 7px;border:1px solid var(--ink);color:var(--ink)}
.rc-foot{display:flex;align-items:center;justify-content:space-between}
.stars{display:flex;gap:2px}
.star{font-size:12px;color:var(--border-light)}
.star.on{color:#D4A843}
.del-btn{font-size:12px;color:var(--hint);padding:2px 6px;background:transparent;border:none}
.del-btn:hover{color:var(--ink)}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.modal{background:var(--bg);border:1.5px solid var(--border);max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
.modal-sm{max-width:420px}
.modal-head{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-head h3{font-family:'Bonche',Georgia,serif;font-size:18px;letter-spacing:-.3px}
.modal-close{font-size:18px;color:var(--muted);background:transparent;border:none;padding:2px}
.modal-close:hover{color:var(--ink)}
.modal-body{padding:18px 24px 24px}
.form-row{margin-bottom:14px}
.form-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.form-input{width:100%;border:1.5px solid var(--ink);padding:8px 12px;font-size:13px;color:var(--ink);outline:none;background:var(--bg)}
.form-input:focus{outline:2px solid var(--ink);outline-offset:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea.form-input{resize:vertical;min-height:70px}
.form-checks{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.check-lbl{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;align-items:center}

/* DETAIL */
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.detail-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.detail-meta-box{border:1.5px solid var(--border-light);padding:10px;text-align:center}
.detail-meta-val{font-family:'Bonche',Georgia,serif;font-size:22px;font-weight:300;color:var(--ink)}
.detail-meta-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.detail-section{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:14px;padding-bottom:4px;border-bottom:1px solid var(--border-light)}
.ingr-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.ingr-item{font-size:12px;color:#555;display:flex;gap:6px;align-items:baseline}
.ingr-item::before{content:'—';color:var(--hint);font-size:10px;flex-shrink:0}
.step-item{display:flex;gap:10px;margin-bottom:8px;font-size:12px;color:#555;line-height:1.5}
.step-num{color:var(--muted);font-size:10px;min-width:16px;padding-top:2px}

/* SWAP */
.swap-option{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border-light);background:var(--surface);margin-bottom:8px;transition:all .12s;cursor:pointer}
.swap-option:hover{border-color:var(--ink);background:var(--ink);color:var(--bg)}
.swap-option:hover .so-meta{color:rgba(255,255,255,.6)}

/* BULK */
.bulk-bar{height:3px;background:var(--border-light);margin:10px 0 16px}
.bulk-fill{height:100%;background:var(--ink);transition:width .3s}
.bulk-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1.5px solid var(--border-light);font-size:12px;margin-bottom:6px}
.bulk-ok{border-color:var(--ink);background:#F0EDE3}
.bulk-err{border-color:#c03030;background:#FFF5F5}

/* PHOTO DROP */
.photo-drop{border:1.5px dashed var(--border);padding:20px;text-align:center;background:var(--bg);transition:all .15s}
.photo-drop:hover{border-color:var(--ink);background:#ECE7DC;cursor:pointer}
.photo-previews{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center}
.photo-previews img{width:72px;height:54px;object-fit:cover;border:1px solid var(--border)}
.ai-status{display:none;align-items:center;gap:10px;border:1.5px solid var(--ink);padding:10px 14px;margin-top:10px;font-size:12px;color:var(--ink)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--bg);padding:10px 18px;font-size:12px;letter-spacing:.5px;z-index:400;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:none;opacity:1}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border-light)}
</style>
</head>
<body>
<div>
  <div class="topbar">
    <div class="logo">Неделя</div>
    <div class="nav">
      <button class="nav-btn active" onclick="showPage('week',this)">Меню</button>
      <button class="nav-btn" onclick="showPage('recipes',this)">Рецепты</button>
    </div>
    <div class="topbar-right">
      <span class="sync-txt sync-ok" id="sync-status">☁ sync</span>
      <button class="gen-btn" id="gen-btn" onclick="generateMenu()">✦ Сгенерировать</button>
    </div>
  </div>

  <div class="page active" id="page-week">
    <div class="stats-row" id="stats-row"></div>
    <div class="week-layout">
      <div>
        <div class="week-head">
          <span class="week-title" id="week-title"></span>
          <div class="week-nav">
            <button onclick="changeWeek(-1)" id="btn-prev">‹</button>
            <span id="week-label">Эта неделя</span>
            <button onclick="changeWeek(1)" id="btn-next">›</button>
          </div>
        </div>
        <div class="col-headers">
          <div></div>
          <div class="col-hdr">Завтрак</div>
          <div class="col-hdr">Обед</div>
          <div class="col-hdr">Ужин</div>
          <div class="col-hdr">Перекус / Десерт</div>
        </div>
        <div id="week-grid"></div>
      </div>
      <div class="shop-panel">
        <div class="shop-title">Список покупок</div>
        <div id="shop-list"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-recipes">
    <div class="recipes-head">
      <h2>База рецептов</h2>
      <div class="search-box">
        <span style="color:var(--hint);font-size:14px">⌕</span>
        <input type="text" placeholder="Поиск..." id="recipe-search" oninput="renderRecipes()">
      </div>
      <label class="outline-btn" style="cursor:pointer">
        📷 Из фото
        <input type="file" accept="image/*" multiple style="display:none" onchange="bulkImport(event)">
      </label>
      <button class="add-btn" onclick="openAddModal()">+ Добавить</button>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="recipes-grid" id="recipes-grid"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay hidden" id="add-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="add-modal-title">Новый рецепт</h3>
      <button class="modal-close" onclick="closeModal('add-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="photo-drop" onclick="document.getElementById('photo-input').click()">
        <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)" id="photo-drop-txt">Загрузи фото или скриншот — ИИ распознает автоматически</div>
        <div class="photo-previews" id="photo-previews"></div>
      </div>
      <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
      <div class="ai-status" id="ai-status"><span class="spin">↻</span><span id="ai-status-txt">Анализирую...</span></div>
      <div style="margin:14px 0;text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--hint)">— или введи вручную —</div>
      <div class="form-row">
        <label class="form-label">Название</label>
        <input class="form-input" id="r-name" placeholder="Шакшука с фетой">
      </div>
      <div class="form-row">
        <label class="form-label">Тип приёма пищи (можно несколько)</label>
        <div class="form-checks" id="meal-checks">
          <label class="check-lbl"><input type="checkbox" id="mc-breakfast" value="breakfast"> Завтрак</label>
          <label class="check-lbl"><input type="checkbox" id="mc-lunch" value="lunch" checked> Обед</label>
          <label class="check-lbl"><input type="checkbox" id="mc-dinner" value="dinner"> Ужин</label>
          <label class="check-lbl"><input type="checkbox" id="mc-snack" value="snack"> Перекус</label>
          <label class="check-lbl"><input type="checkbox" id="mc-dessert" value="dessert"> Десерт</label>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label class="form-label">Кухня</label>
          <select class="form-input" id="r-cuisine">
            <option value="eu">Европейская</option>
            <option value="fr">Французская</option>
            <option value="it">Итальянская</option>
            <option value="ru">Русская</option>
            <option value="il">Израильская</option>
            <option value="med">Средиземноморская</option>
            <option value="th">Тайская</option>
            <option value="us">Американская</option>
            <option value="as">Азиатская</option>
            <option value="mex">Мексиканская</option>
            <option value="tr">Турецкая</option>
            <option value="in">Индийская</option>
            <option value="jp">Японская</option>
            <option value="ko">Корейская</option>
            <option value="uz">Узбекская</option>
            <option value="ge">Грузинская</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Белок (г/порцию)</label>
          <input class="form-input" id="r-protein" type="number" placeholder="35">
        </div>
        <div class="form-row">
          <label class="form-label">Время (мин)</label>
          <input class="form-input" id="r-time" type="number" placeholder="30">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Ингредиенты (через запятую)</label>
        <textarea class="form-input" id="r-ingredients" placeholder="куриное филе 300г, яйца 3шт..."></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">Шаги приготовления</label>
        <textarea class="form-input" id="r-steps" rows="4" placeholder="Шаг 1. ...&#10;Шаг 2. ..."></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">Оборудование</label>
        <div class="form-checks">
          <label class="check-lbl"><input type="checkbox" id="eq-stove" value="stove" checked> Плита</label>
          <label class="check-lbl"><input type="checkbox" id="eq-oven" value="oven"> Духовка</label>
          <label class="check-lbl"><input type="checkbox" id="eq-airfryer" value="airfryer"> Аэрогриль</label>
          <label class="check-lbl"><input type="checkbox" id="eq-blender" value="blender"> Блендер</label>
          <label class="check-lbl"><input type="checkbox" id="eq-microwave" value="microwave"> Микроволновка</label>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Теги</label>
        <div class="form-checks">
          <label class="check-lbl"><input type="checkbox" id="tag-prot" value="prot"> Белок ≥25г</label>
          <label class="check-lbl"><input type="checkbox" id="tag-light" value="light" checked> Лёгкое</label>
          <label class="check-lbl"><input type="checkbox" id="tag-sweet" value="sweet"> Сладкое</label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="outline-btn" onclick="pasteJSON()">📋 Вставить JSON</button>

// ── WEEK KEY & MIGRATION (must be defined before use) ────────────────────
function getWeekKey(offset){
  // Returns "YYYY_WW" for the Monday of (current week + offset weeks)
  const d=new Date();
  d.setDate(d.getDate()+offset*7-((d.getDay()+6)%7));
  const y=d.getFullYear();
  const jan1=new Date(y,0,1);
  const wk=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return y+'_'+String(wk).padStart(2,'0');
}

function migrateMenu(rawMenus){
  if(!rawMenus||typeof rawMenus!=='object') return {};
  const migrated={};
  Object.entries(rawMenus).forEach(([weekKey,days])=>{
    if(!days||typeof days!=='object') return;
    migrated[weekKey]={};
    Object.entries(days).forEach(([d,slots])=>{
      if(!slots||typeof slots!=='object') return;
      const s={...slots};
      if((s.snack||s.dessert)&&!s.snack_dessert){
        s.snack_dessert=s.snack||s.dessert||{recipeId:null,isLeftover:false};
        delete s.snack; delete s.dessert;
      }
      migrated[weekKey][d]=s;
    });
  });
  return migrated;
}

const PROTEIN_W=['курин','говяж','яйц','творог','фарш','стейк','бульон','протеин','бёдра','филе'];
const DAIRY_W=['йогурт','сыр','молок','фета','сливки'];
const PRODUCE_W=['томат','помидор','перец','брокколи','шпинат','батат','морков','цукини','авокадо','лук','огурец','ягод','банан','лайм','яблок','фиг','сельдерей','петрушк','кориандр','зелень','базилик','имбирь','чеснок','розмарин','тортилья'];
const GRAINS_W=['рис','булгур','паста','гречк','нут','гранол','мука','хлеб','хлопь','овсян'];
const SPICES_W=['специ','паприк','куркум','корица','ваниль','мёд','соевый','уксус','масло','кунжут','орех','миндаль','арахис','соль','разрыхл','шоколад'];

function extractName(ing){
  return ing.trim()
    .replace(/\s+\d[\d.,]*\s*(г|кг|мл|л|шт|ст\.л\.|ч\.л\.|зуб|банк[а-я]*|пор[а-я]*|конс\.|\%)?(\s|$)/ig,'')
    .replace(/\s+\d+$/,'').trim();
}

function categorise(items){
  const c={protein:[],dairy:[],produce:[],grains:[],spices:[],other:[]};
  items.forEach(item=>{
    const low=item.toLowerCase();
    if(PROTEIN_W.some(w=>low.includes(w))) c.protein.push(item);
    else if(DAIRY_W.some(w=>low.includes(w))) c.dairy.push(item);
    else if(PRODUCE_W.some(w=>low.includes(w))) c.produce.push(item);
    else if(GRAINS_W.some(w=>low.includes(w))) c.grains.push(item);
    else if(SPICES_W.some(w=>low.includes(w))) c.spices.push(item);
    else c.other.push(item);
  });
  return c;
}

function buildShoppingList(){
  const all={};
  const wm=allMenus[getWeekKey(weekOffset)]||{};
  Object.values(wm).forEach(day=>{
    MEAL_TYPES.forEach(mt=>{
      const slot=day[mt];
      if(!slot?.recipeId||slot.isLeftover) return;
      const r=getRecipe(slot.recipeId);if(!r) return;
      r.ingredients.split(',').forEach(ing=>{
        const name=extractName(ing);const key=name.toLowerCase();
        if(key) all[key]=name;
      });
    });
  });
  const items=Object.values(all);
  const cats=categorise(items);
  const labels={protein:'Белки',dairy:'Молочное',produce:'Овощи и фрукты',grains:'Крупы и паста',spices:'Приправы и сладкое',other:'Прочее'};
  const el=document.getElementById('shop-list');
  el.innerHTML='';
  if(!items.length){el.innerHTML='<div style="font-size:12px;color:var(--hint)">Сгенерируй меню</div>';return;}
  Object.entries(cats).forEach(([k,arr])=>{
    if(!arr.length) return;
    el.innerHTML+=`<div class="shop-cat">
      <div class="shop-cat-title">${labels[k]}</div>
      ${arr.map(item=>{
        const key=item.toLowerCase().replace(/\s+/g,'-');
        const done=shoppingChecked[key];
        return`<div class="shop-item${done?' checked':''}" onclick="toggleShop('${key}',this)">
          <div class="shop-dot"></div><span>${item}</span>
        </div>`;
      }).join('')}
    </div>`;
  });
}

function toggleShop(key,el){
  shoppingChecked[key]=!shoppingChecked[key];
  el.classList.toggle('checked',shoppingChecked[key]);
  saveMenu();
}

  for(const d of COOK_DAYS){
    const avLu=avail('lunch').filter(r=>!usedMain.has(r.id));
    const lu=pickRandom(avLu.length?avLu:avail('lunch'));
    const avDi=avail('dinner').filter(r=>!usedMain.has(r.id)&&(!lu||r.id!==lu.id));
    const di=pickRandom(avDi.length?avDi:avail('dinner').filter(r=>!lu||r.id!==lu.id));
    const bf=pickRandom(avail('breakfast').filter(r=>!usedBF.has(r.id)));
    const sndsPool=recipes.filter(r=>getMeals(r).some(m=>m==='snack'||m==='dessert')&&!r.banned&&!usedSN.has(r.id));
    const snds=pickRandom(sndsPool.length?sndsPool:recipes.filter(r=>getMeals(r).some(m=>m==='snack'||m==='dessert')&&!r.banned));
    if(lu){usedMain.add(lu.id);lu.timesUsed++;}
    if(di){usedMain.add(di.id);di.timesUsed++;}
    if(bf) usedBF.add(bf.id);
    if(snds) usedSN.add(snds.id);
    // Store snackId so non-cook day can use as leftover
    cookMeals[d]={lunchId:lu?.id,dinnerId:di?.id,snackId:snds?.id};
    newMenu[d]={
      breakfast:{recipeId:bf?.id,isLeftover:false},
      lunch:{recipeId:lu?.id,isLeftover:false},
      dinner:{recipeId:di?.id,isLeftover:false},
      snack_dessert:{recipeId:snds?.id,isLeftover:false},
    };
  }

  // Non-cook days — leftovers for lunch/dinner/snack, fresh BF
  for(let d=0;d<7;d++){
    if(COOK_DAYS.includes(d)) continue;
    const prevCook=COOK_DAYS.filter(cd=>cd<d).slice(-1)[0];
    let lunchId=null,dinnerId=null,snackId=null;
    let lunchLeft=false,dinnerLeft=false,snackLeft=false;

    if(prevCook!==undefined&&!leftGiven[prevCook].lunch){
      lunchId=cookMeals[prevCook]?.lunchId;
      if(lunchId){leftGiven[prevCook].lunch=true;lunchLeft=true;}
    }
    if(prevCook!==undefined&&!leftGiven[prevCook].dinner){
      dinnerId=cookMeals[prevCook]?.dinnerId;
      if(dinnerId){leftGiven[prevCook].dinner=true;dinnerLeft=true;}
    }
    if(prevCook!==undefined&&!leftGiven[prevCook].snack){
      snackId=cookMeals[prevCook]?.snackId;
      if(snackId){leftGiven[prevCook].snack=true;snackLeft=true;}
    }

    // If no leftover available (second non-cook day), pick fresh
    if(!lunchId){const r=pickRandom(avail('lunch').filter(r=>!usedMain.has(r.id)));if(r){lunchId=r.id;usedMain.add(r.id);}}
    if(!dinnerId){const r=pickRandom(avail('dinner').filter(r=>!usedMain.has(r.id)));if(r){dinnerId=r.id;usedMain.add(r.id);}}
    if(!snackId){
      const p=recipes.filter(r=>getMeals(r).some(m=>m==='snack'||m==='dessert')&&!r.banned&&!usedSN.has(r.id));
      const r=pickRandom(p.length?p:recipes.filter(r=>getMeals(r).some(m=>m==='snack'||m==='dessert')&&!r.banned));
      if(r){snackId=r.id;usedSN.add(r.id);}
    }

    const qBF=avail('breakfast').filter(r=>r.time<=10&&!usedBF.has(r.id));
    const aBF=avail('breakfast').filter(r=>!usedBF.has(r.id));
    const bf=pickRandom(qBF.length?qBF:aBF.length?aBF:avail('breakfast'));
    if(bf) usedBF.add(bf.id);

    newMenu[d]={
      breakfast:{recipeId:bf?.id,isLeftover:false},
      lunch:{recipeId:lunchId,isLeftover:lunchLeft},
      dinner:{recipeId:dinnerId,isLeftover:dinnerLeft},
      snack_dessert:{recipeId:snackId,isLeftover:snackLeft},
    };
  }

  // Only keep current and next week
  const cleanMenus={};
  [0,1].forEach(o=>{const k=getWeekKey(o);if(allMenus[k])cleanMenus[k]=allMenus[k];});
  cleanMenus[getWeekKey(weekOffset)]=newMenu;
  allMenus=cleanMenus;
  await saveMenu();
  renderWeek();buildShoppingList();
  btn.disabled=false;btn.textContent='✦ Сгенерировать меню';
  showToast('Меню составлено!');
}

// ── WEEK RENDER ───────────────────────────────────────────────────────────
function getWeekDates(){
  const base=new Date();
  base.setDate(base.getDate()+weekOffset*7);
  const mon=new Date(base);
  mon.setDate(base.getDate()-((base.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function changeWeek(dir){
  const newOffset=weekOffset+dir;
  if(newOffset<0||newOffset>1) return; // only current and next week
  weekOffset=newOffset;
  renderWeek();buildShoppingList();
  if(!allMenus[getWeekKey(weekOffset)]) generateMenu();
}

function renderWeek(){
  const dates=getWeekDates();
  const y=dates[0].getFullYear();
  document.getElementById('week-title').textContent=fmtDate(dates[0])+'–'+fmtDate(dates[6])+' '+y;
  document.getElementById('week-label').textContent=weekOffset===0?'Эта неделя':'Следующая неделя';
  const bp=document.getElementById('btn-prev');const bn=document.getElementById('btn-next');
  if(bp){bp.style.opacity=weekOffset===0?'0.2':'1';bp.style.pointerEvents=weekOffset===0?'none':'auto';}
  if(bn){bn.style.opacity=weekOffset===1?'0.2':'1';bn.style.pointerEvents=weekOffset===1?'none':'auto';}

  const wm=allMenus[getWeekKey(weekOffset)]||{};
  let totProt=0,mealCnt=0;const cuisines=new Set();
  const grid=document.getElementById('week-grid');
  grid.innerHTML='';

  dates.forEach((date,d)=>{
    const isCook=COOK_DAYS.includes(d);
    const dayData=wm[d]||{};
    const row=document.createElement('div');
    row.className='day-row'+(isCook?' cook-row':'');

    // Day label
    const lbl=document.createElement('div');
    lbl.className='day-lbl'+(isCook?' cook':'');
    lbl.innerHTML=`<span class="day-name">${DAYS[d]}</span><span class="day-num">${date.getDate()}</span>${isCook?'<div class="cook-dot"></div>':''}`;
    row.appendChild(lbl);

    MEAL_TYPES.forEach(mt=>{
      const slot=dayData[mt];
      const r=slot?.recipeId?getRecipe(slot.recipeId):null;
      const cell=document.createElement('div');

      if(r){
        cell.className='meal-cell'+(slot.isLeftover?' leftover':'');
        cell.innerHTML=`
          ${slot.isLeftover?'<div class="mc-leftover">остаток</div>':''}
          <div onclick="openDetail(${r.id})" style="flex:1;cursor:pointer">
            <div class="mc-type">${MEAL_LABELS[mt]}</div>
            <div class="mc-name">${r.name}</div>
            <div class="mc-prot">+${r.protein}г · ${r.time}мин</div>
            <div class="mc-tags">
              <span class="mc-tag">${CUISINE_LABELS[r.cuisine]}</span>
              ${r.tags.includes('prot')?'<span class="mc-tag">Белок</span>':''}
              ${r.tags.includes('sweet')?'<span class="mc-tag">Десерт</span>':''}
            </div>
          </div>
          <button class="mc-swap" onclick="event.stopPropagation();openSwap(${d},'${mt}')">↻ Заменить</button>`;
        if(!slot.isLeftover){totProt+=r.protein;mealCnt++;cuisines.add(r.cuisine);}
      } else {
        cell.className='empty-cell'+(isCook?' cook-day-bg':'');
        cell.innerHTML='+';
        cell.onclick=()=>openSwap(d,mt);
      }
      row.appendChild(cell);
    });
    grid.appendChild(row);
  });

  // Stats
  const avgProt=mealCnt?Math.round(totProt/7):0;
  document.getElementById('stats-row').innerHTML=[
    {lbl:'Белок / день',val:avgProt,unit:'г',pct:Math.min(100,avgProt/1.5)},
    {lbl:'Заполнено',val:mealCnt,unit:'/ 28',pct:mealCnt/28*100},
    {lbl:'Кухни недели',val:cuisines.size,unit:'типа',pct:cuisines.size/5*100},
  ].map(s=>`<div class="stat-card">
    <div class="stat-lbl">${s.lbl}</div>
    <div class="stat-val">${s.val}<span class="stat-unit">${s.unit}</span></div>
    <div class="stat-bar"><div class="stat-fill" style="width:${s.pct}%"></div></div>
  </div>`).join('');
}

// ── SWAP ──────────────────────────────────────────────────────────────────
function openSwap(dayIdx,mealType){
  currentSwapSlot={dayIdx,mealType};
  document.getElementById('swap-slot-name').textContent=DAYS_FULL[dayIdx]+' — '+MEAL_LABELS[mealType];
  // For snack_dessert slot show both snack and dessert recipes
  const mealFilter=mealType==='snack_dessert'
    ?r=>getMeals(r).some(m=>m==='snack'||m==='dessert')&&!r.banned
    :r=>getMeals(r).includes(mealType)&&!r.banned;
  const opts=recipes.filter(mealFilter).sort((a,b)=>b.rating-a.rating).slice(0,10);
  document.getElementById('swap-options').innerHTML=opts.map(r=>`
    <div class="swap-option" onclick="applySwap(${r.id})">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${r.name}</div>
        <div class="so-meta" style="font-size:11px;color:var(--muted);margin-top:2px">+${r.protein}г · ${r.time}мин · ${CUISINE_LABELS[r.cuisine]}</div>
      </div>
      <div>${[1,2,3,4,5].map(s=>`<span style="font-size:11px;color:${s<=r.rating?'#D4A843':'var(--border-light)'}">★</span>`).join('')}</div>
    </div>`).join('');
  openModal('swap-modal');
}

async function applySwap(recipeId){
  if(!currentSwapSlot) return;
  const {dayIdx,mealType}=currentSwapSlot;
  const wm={...allMenus[getWeekKey(weekOffset)]||{}};

  // Update the swapped slot
  wm[dayIdx]={...(wm[dayIdx]||{}),[mealType]:{recipeId,isLeftover:false}};

  // If this is a cook day — also update leftover days that had the OLD recipe
  if(COOK_DAYS.includes(dayIdx)){
    const oldRecipeId=(allMenus[getWeekKey(weekOffset)]||{})[dayIdx]?.[mealType]?.recipeId;
    for(let d=0;d<7;d++){
      if(COOK_DAYS.includes(d)) continue;
      const prevCook=COOK_DAYS.filter(cd=>cd<d).slice(-1)[0];
      if(prevCook===dayIdx && wm[d]?.[mealType]?.recipeId===oldRecipeId && wm[d]?.[mealType]?.isLeftover){
        wm[d]={...wm[d],[mealType]:{recipeId,isLeftover:true}};
      }
    }
  }

  allMenus={...allMenus,[getWeekKey(weekOffset)]:wm};
  closeModal('swap-modal');
  await saveMenu();renderWeek();buildShoppingList();
  showToast('Блюдо заменено!');
}

// ── RECIPES PAGE ──────────────────────────────────────────────────────────
const FILTER_LABELS={all:'Все',breakfast:'Завтраки',lunch:'Обеды',dinner:'Ужины',snack:'Перекусы',dessert:'Десерты',eu:'Европейская',fr:'Французская',it:'Итальянская',ru:'Русская',il:'Израильская',med:'Средиземноморская',th:'Тайская',us:'Американская',as:'Азиатская',mex:'Мексиканская',tr:'Турецкая',in:'Индийская',jp:'Японская',ko:'Корейская',uz:'Узбекская',ge:'Грузинская'};

function renderFilters(){
  document.getElementById('filter-bar').innerHTML=Object.keys(FILTER_LABELS).map(k=>
    `<button class="filter-pill${activeFilters.has(k)?' active':''}" onclick="toggleFilter('${k}')">${FILTER_LABELS[k]}</button>`
  ).join('');
}

function toggleFilter(f){
  if(f==='all'){activeFilters=new Set(['all']);}
  else{activeFilters.delete('all');activeFilters.has(f)?activeFilters.delete(f):activeFilters.add(f);if(!activeFilters.size)activeFilters.add('all');}
  renderRecipes();
}

function renderRecipes(){
  renderFilters();
  const q=(document.getElementById('recipe-search')?.value||'').toLowerCase();
  const list=recipes.filter(r=>{
    const ms=getMeals(r);
    const mf=activeFilters.has('all')||ms.some(m=>activeFilters.has(m))||activeFilters.has(r.cuisine);
    return mf&&(!q||r.name.toLowerCase().includes(q));
  });
  document.getElementById('recipes-grid').innerHTML=list.map(r=>`
    <div class="recipe-card${r.banned?' banned':''}" onclick="openDetail(${r.id})">
      <div class="rc-type">${getMealLabel(r)}</div>
      <div class="rc-name">${r.name}</div>
      <div class="rc-meta"><span>🥩 ${r.protein}г</span><span>⏱ ${r.time}мин</span></div>
      <div class="rc-tags">
        <span class="rc-tag">${CUISINE_LABELS[r.cuisine]}</span>
        ${r.tags.includes('prot')?'<span class="rc-tag">Белок</span>':''}
        ${r.tags.includes('sweet')?'<span class="rc-tag">Сладкое</span>':''}
        ${r.tags.includes('light')?'<span class="rc-tag">Лёгкое</span>':''}
      </div>
      <div class="rc-foot">
        <div class="stars">${[1,2,3,4,5].map(s=>`<span class="star${s<=r.rating?' on':''}" onclick="event.stopPropagation();rateRecipe(${r.id},${s})">★</span>`).join('')}</div>
        <button class="del-btn" onclick="event.stopPropagation();deleteRecipe(${r.id})">✕</button>
      </div>
    </div>`).join('')||'<div style="color:var(--hint);font-size:13px;padding:20px;grid-column:1/-1">Нет рецептов</div>';
}

function rateRecipe(id,s){const r=getRecipe(id);if(r){r.rating=s;saveRecipes();renderRecipes();}}
function deleteRecipe(id){if(!confirm('Удалить?'))return;recipes=recipes.filter(r=>r.id!==id);saveRecipes();renderRecipes();showToast('Удалено');}

// ── ADD/EDIT ──────────────────────────────────────────────────────────────
function resetAddForm(){
  editingId=null;
  document.getElementById('add-modal-title').textContent='Новый рецепт';
  document.getElementById('add-modal-save').textContent='Сохранить';
  document.getElementById('add-modal-save').onclick=saveRecipe;
  ['r-name','r-protein','r-time','r-ingredients','r-steps'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('r-cuisine').value='eu';
  document.getElementById('photo-previews').innerHTML='';
  document.getElementById('photo-input').value='';
  document.getElementById('photo-drop-txt').textContent='Загрузи фото или скриншот — ИИ распознает автоматически';
  document.getElementById('ai-status').style.display='none';
  ['mc-breakfast','mc-lunch','mc-dinner','mc-snack','mc-dessert'].forEach(id=>document.getElementById(id).checked=id==='mc-lunch');
  ['eq-stove','eq-oven','eq-airfryer','eq-blender','eq-microwave'].forEach(id=>document.getElementById(id).checked=id==='eq-stove');
  document.getElementById('tag-prot').checked=false;
  document.getElementById('tag-light').checked=true;
  document.getElementById('tag-sweet').checked=false;
}

function openAddModal(){resetAddForm();openModal('add-modal');}

function editRecipe(id){
  const r=getRecipe(id);if(!r) return;
  resetAddForm();
  editingId=id;
  document.getElementById('add-modal-title').textContent='Редактировать рецепт';
  document.getElementById('add-modal-save').textContent='Сохранить изменения';
  document.getElementById('r-name').value=r.name;
  document.getElementById('r-protein').value=r.protein;
  document.getElementById('r-time').value=r.time;
  document.getElementById('r-ingredients').value=r.ingredients;
  document.getElementById('r-steps').value=r.steps;
  document.getElementById('r-cuisine').value=r.cuisine;
  const ms=getMeals(r);
  ['mc-breakfast','mc-lunch','mc-dinner','mc-snack','mc-dessert'].forEach(id=>document.getElementById(id).checked=ms.includes(id.replace('mc-','')));
  ['eq-stove','eq-oven','eq-airfryer','eq-blender','eq-microwave'].forEach(id=>document.getElementById(id).checked=(r.equipment||[]).includes(id.replace('eq-','')));
  document.getElementById('tag-prot').checked=(r.tags||[]).includes('prot');
  document.getElementById('tag-light').checked=(r.tags||[]).includes('light');
  document.getElementById('tag-sweet').checked=(r.tags||[]).includes('sweet');
  closeModal('detail-modal');
  openModal('add-modal');
}

async function saveRecipe(){
  const name=document.getElementById('r-name').value.trim();
  if(!name){showToast('Введи название');return;}
  const meals=Array.from(document.querySelectorAll('#meal-checks input:checked')).map(cb=>cb.value);
  if(!meals.length){showToast('Выбери тип приёма пищи');return;}
  const equip=Array.from(document.querySelectorAll('#add-modal input[type=checkbox]')).filter(cb=>['stove','oven','airfryer','blender','microwave'].includes(cb.value)&&cb.checked).map(cb=>cb.value);
  const tags=[];
  if(document.getElementById('tag-prot').checked) tags.push('prot');
  if(document.getElementById('tag-light').checked) tags.push('light');
  if(document.getElementById('tag-sweet').checked) tags.push('sweet');
  const prot=parseInt(document.getElementById('r-protein').value)||20;
  if(!tags.length) tags.push(prot>=25?'prot':'light');

  if(editingId){
    const r=getRecipe(editingId);
    if(r) Object.assign(r,{name,meals,cuisine:document.getElementById('r-cuisine').value,protein:prot,time:parseInt(document.getElementById('r-time').value)||30,ingredients:document.getElementById('r-ingredients').value,steps:document.getElementById('r-steps').value,equipment:equip,tags});
    showToast('Рецепт обновлён!');
  } else {
    recipes.push({id:nextId++,name,meals,cuisine:document.getElementById('r-cuisine').value,protein:prot,time:parseInt(document.getElementById('r-time').value)||30,tags,ingredients:document.getElementById('r-ingredients').value,steps:document.getElementById('r-steps').value,equipment:equip,rating:3,banned:false,timesUsed:0});
    showToast('Рецепт добавлен!');
  }
  await saveRecipes();
  closeModal('add-modal');renderRecipes();
}

// ── PASTE JSON ────────────────────────────────────────────────────────────
async function pasteJSON(){
  try{
    const p=JSON.parse(await navigator.clipboard.readText());
    if(p.name) document.getElementById('r-name').value=p.name;
    if(p.cuisine) document.getElementById('r-cuisine').value=p.cuisine;
    if(p.protein) document.getElementById('r-protein').value=p.protein;
    if(p.time) document.getElementById('r-time').value=p.time;
    if(p.ingredients) document.getElementById('r-ingredients').value=p.ingredients;
    if(p.steps) document.getElementById('r-steps').value=p.steps;
    const ms=Array.isArray(p.meals)?p.meals:(p.meal?[p.meal]:[]);
    if(ms.length)['mc-breakfast','mc-lunch','mc-dinner','mc-snack','mc-dessert'].forEach(id=>document.getElementById(id).checked=ms.includes(id.replace('mc-','')));
    if(Array.isArray(p.equipment))['eq-stove','eq-oven','eq-airfryer','eq-blender','eq-microwave'].forEach(id=>document.getElementById(id).checked=p.equipment.includes(id.replace('eq-','')));
    if(Array.isArray(p.tags)){document.getElementById('tag-prot').checked=p.tags.includes('prot');document.getElementById('tag-light').checked=p.tags.includes('light');document.getElementById('tag-sweet').checked=p.tags.includes('sweet');}
    showToast('JSON вставлен!');
  }catch{showToast('Ошибка вставки JSON');}
}

// ── PHOTO RECOGNITION ─────────────────────────────────────────────────────
async function handlePhotos(e){
  const files=Array.from(e.target.files);if(!files.length) return;
  const prev=document.getElementById('photo-previews');prev.innerHTML='';
  const b64s=[];
  await Promise.all(files.map(f=>new Promise(res=>{
    const rd=new FileReader();rd.onload=ev=>{const img=document.createElement('img');img.src=ev.target.result;prev.appendChild(img);b64s.push({data:ev.target.result.split(',')[1],type:f.type||'image/jpeg'});res();};rd.readAsDataURL(f);
  })));
  document.getElementById('photo-drop-txt').textContent=files.length+' фото загружено';
  const status=document.getElementById('ai-status');
  document.getElementById('ai-status-txt').textContent='Анализирую '+files.length+' фото...';
  status.style.display='flex';
  try{
    const content=b64s.map(b=>({type:'image',source:{type:'base64',media_type:b.type,data:b.data}}));
    content.push({type:'text',text:'Распознай рецепт. Верни ТОЛЬКО JSON: {"name":"название","meals":["lunch"],"cuisine":"eu","protein":40,"time":30,"ingredients":"ингр1,ингр2","steps":"Шаг 1.\\nШаг 2.","equipment":["stove"],"tags":["prot"]}. meals из breakfast/lunch/dinner/snack/dessert. Без свинины/рыбы. Если не рецепт — {"error":"не распознан"}'});
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content}]})});
    if(!resp.ok) throw new Error('API '+resp.status);
    const data=await resp.json();
    const txt=(data.content||[]).find(c=>c.type==='text')?.text||'{}';
    const p=JSON.parse(txt.replace(/```json|```/g,'').trim());
    if(p.error) throw new Error(p.error);
    if(p.name) document.getElementById('r-name').value=p.name;
    if(p.cuisine) document.getElementById('r-cuisine').value=p.cuisine;
    if(p.protein) document.getElementById('r-protein').value=p.protein;
    if(p.time) document.getElementById('r-time').value=p.time;
    if(p.ingredients) document.getElementById('r-ingredients').value=p.ingredients;
    if(p.steps) document.getElementById('r-steps').value=p.steps;
    const ms=Array.isArray(p.meals)?p.meals:[];
    if(ms.length)['mc-breakfast','mc-lunch','mc-dinner','mc-snack','mc-dessert'].forEach(id=>document.getElementById(id).checked=ms.includes(id.replace('mc-','')));
    if(Array.isArray(p.equipment))['eq-stove','eq-oven','eq-airfryer','eq-blender','eq-microwave'].forEach(id=>document.getElementById(id).checked=p.equipment.includes(id.replace('eq-','')));
    if(Array.isArray(p.tags)){document.getElementById('tag-prot').checked=p.tags.includes('prot');document.getElementById('tag-light').checked=p.tags.includes('light');document.getElementById('tag-sweet').checked=p.tags.includes('sweet');}
    showToast('ИИ распознал рецепт!');
  }catch(err){showToast('Ошибка распознавания — заполни вручную');}
  status.style.display='none';
}

// ── BULK IMPORT ───────────────────────────────────────────────────────────
async function bulkImport(e){
  const files=Array.from(e.target.files);if(!files.length) return;
  e.target.value='';
  openModal('bulk-modal');
  document.getElementById('bulk-results').innerHTML='';
  document.getElementById('bulk-close').style.display='none';
  document.getElementById('bulk-counter').textContent='0 / '+files.length;
  document.getElementById('bulk-fill').style.width='0%';
  const newR=[...recipes];let added=0;

  for(let i=0;i<files.length;i++){
    const f=files[i];
    document.getElementById('bulk-status-txt').textContent='Распознаю: '+f.name;
    const row=document.createElement('div');row.className='bulk-item';row.textContent=f.name;
    document.getElementById('bulk-results').appendChild(row);
    try{
      const b64=await new Promise((res,rej)=>{const rd=new FileReader();rd.onload=ev=>res(ev.target.result.split(',')[1]);rd.onerror=rej;rd.readAsDataURL(f);});
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:f.type||'image/jpeg',data:b64}},{type:'text',text:'Распознай рецепт. Верни ТОЛЬКО JSON: {"name":"название","meals":["lunch"],"cuisine":"eu","protein":40,"time":30,"ingredients":"ингр1,ингр2","steps":"Шаг 1.\\nШаг 2.","equipment":["stove"],"tags":["prot"]}. meals из breakfast/lunch/dinner/snack/dessert. Без свинины/рыбы. Если не рецепт — {"error":"не распознан"}'}]}]})});
      if(!resp.ok) throw new Error('API '+resp.status);
      const data=await resp.json();
      const txt=(data.content||[]).find(c=>c.type==='text')?.text||'{}';
      const p=JSON.parse(txt.replace(/```json|```/g,'').trim());
      if(p.error) throw new Error(p.error);
      if(!p.name) throw new Error('нет названия');
      const maxId=newR.reduce((m,r)=>Math.max(m,r.id),0);
      newR.push({id:maxId+1,name:p.name,meals:Array.isArray(p.meals)?p.meals:['lunch'],cuisine:p.cuisine||'eu',protein:parseInt(p.protein)||20,time:parseInt(p.time)||30,tags:Array.isArray(p.tags)?p.tags:['light'],ingredients:p.ingredients||'',steps:p.steps||'',equipment:Array.isArray(p.equipment)?p.equipment:[],rating:3,banned:false,timesUsed:0});
      added++;
      row.className='bulk-item bulk-ok';
      row.innerHTML=`<span>✓</span> ${p.name} <span style="color:var(--muted);font-size:11px;margin-left:auto">${p.protein}г · ${p.time}мин</span>`;
    }catch(err){
      row.className='bulk-item bulk-err';
      row.innerHTML=`<span style="color:#c03030">✕</span> ${f.name} <span style="color:#c03030;font-size:11px;margin-left:auto">${err.message}</span>`;
    }
    document.getElementById('bulk-counter').textContent=(i+1)+' / '+files.length;
    document.getElementById('bulk-fill').style.width=Math.round((i+1)/files.length*100)+'%';
    if(i<files.length-1) await new Promise(r=>setTimeout(r,600));
  }
  if(added>0){recipes=newR;nextId=recipes.reduce((m,r)=>Math.max(m,r.id),0)+1;await saveRecipes();renderRecipes();}
  document.getElementById('bulk-status-txt').textContent='Готово: добавлено '+added+' из '+files.length;
  document.getElementById('bulk-close').style.display='';
  showToast('Добавлено '+added+' рецептов');
}

// ── UI ────────────────────────────────────────────────────────────────────
function showPage(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn) btn.classList.add('active');
  if(p==='recipes') renderRecipes();
}
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',async function(){
  // Fast load from localStorage
  try{
    const raw=localStorage.getItem('nedelia_v4');
    if(raw){const d=JSON.parse(raw);recipes=d.recipes||[];allMenus=migrateMenu(d.allMenus)||{};shoppingChecked=d.shoppingChecked||{};nextId=d.nextId||26;}
  }catch(e){}
  if(!recipes.length) recipes=DEFAULT_RECIPES.map(r=>({...r}));

  weekOffset=0;

  // Fast render
  renderWeek();
  renderFilters();

  // Generate if no menu for this week yet
  if(!allMenus[getWeekKey(0)]){
    generateMenu();
  } else {
    buildShoppingList();
  }

  // Load from Supabase in background
  await loadCloud();
  localStorage.setItem('nedelia_v4',JSON.stringify({recipes,allMenus,shoppingChecked,nextId}));
  renderWeek();
  renderFilters();
  // After cloud load — generate if still empty
  if(!allMenus[getWeekKey(weekOffset)]){
    generateMenu();
  } else {
    buildShoppingList();
  }
  showToast('Загружено '+recipes.length+' рецептов');

  // Autosave locally every 5s
  setInterval(()=>{try{localStorage.setItem('nedelia_v4',JSON.stringify({recipes,allMenus,shoppingChecked,nextId}));}catch(e){}},5000);
});
</script>
